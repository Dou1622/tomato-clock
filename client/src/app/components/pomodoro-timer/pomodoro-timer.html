<div class="timer-container">
  <h2>Pomodoro Timer</h2>
  <h3 class="status-title">
    @if (isBreak) {
      <span style="color: #2ecc71;">☕ Break</span>
    } @else {
      <span style="color: #e74c3c;">🔥 Focus</span>
    }
  </h3>
  
  <!-- <div class="time-display">
    {{ formatTime }}
  </div> -->
  
  <!-- <div class="circle">
    <svg width="100" height="100">
      <circle cx="50" cy="50" r="40" stroke="Black" stroke-width="4" fill="none" stroke-dasharray="280"; />
      <text fill="black" font-size="10" font-family="Verdana" x="50" y="50">{{ formatTime }}</text>
    </svg>
  </div> -->

  <div class="timer-circle">
    <svg class="progress-ring" width="160" height="160">
      <circle class="progress-ring_circle"
        stroke-width="4" // Line width
        stroke="black"   // Line color
        fill="transparent"
        r="72"    // r=(width/2)-(stroke-width*2)
        cx="80"
        cy="80"
        [style.strokeDasharray]="circumference"
        [style.strokeDashoffset]="strokeDashoffset"
      />
      <text fill="black" font-size="10" font-family="Verdana" x="50" y="50">{{ formatTime }}</text>
    </svg>
  </div>

  <div class="controls">
    @if (!isRunning) {
        <button (click)="startTimer()">Start</button>
    } @else {
        <button (click)="pauseTimer()">Pause</button>
    }
    <button (click)="resetTimer()">Reset</button>
    <button (click)="resetAllTimer()">Reset All</button>
  </div>
</div>
