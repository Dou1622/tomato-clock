<div>
	<h3>Timers</h3>

	<div *ngIf="loading()">Loading timers...</div>
	<div *ngIf="error()" class="error">{{ error() }}</div>

	<table *ngIf="!loading() && !error() && timers().length">
		<thead>
			<tr>
				<th>Id</th>
				<th>Name</th>
				<th>Start (UTC)</th>
				<th>End (UTC)</th>
			</tr>
		</thead>
		<tbody>
			<tr *ngFor="let t of timers()">
				<td>{{ t.id }}</td>
				<td>{{ t.name }}</td>
				<td>{{ t.startTimeUtc }}</td>
				<td>{{ t.endTimeUtc ?? '-' }}</td>
			</tr>
		</tbody>
	</table>

	<div *ngIf="!loading && !error && !timers.length">No timers found.</div>
</div>
